# ── HOW TO CREATE THIS FILE ───────────────────────────────────────────────────
# Run this PowerShell to generate base64 values:
#   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your-value-here"))
#
# Or on Linux/Mac:
#   echo -n "your-value-here" | base64
#
# Then paste the results below and save as k8s/01-secrets.yaml
# DO NOT commit this file — it is gitignored.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: testbuddy-secrets
  namespace: testbuddy
type: Opaque
data:
  # echo -n "postgres123" | base64  →  cG9zdGdyZXMxMjM=
  POSTGRES_PASSWORD: cG9zdGdyZXMxMjM=

  # echo -n "your-claude-api-key" | base64
  CLAUDE_API_KEY: eW91ci1jbGF1ZGUtYXBpLWtleQ==

  # Generate a strong random secret (min 32 bytes for HMAC-SHA256):
  #   openssl rand -base64 48 | base64
  # or: echo -n "your-secret-here" | base64
  JWT_SECRET: eW91ci1qd3Qtc2VjcmV0LWNoYW5nZS1tZQ==

  # Comma-separated list of allowed frontend origins
  # echo -n "https://your-domain.com" | base64
  CORS_ALLOWED_ORIGINS: aHR0cHM6Ly95b3VyLWRvbWFpbi5jb20=
