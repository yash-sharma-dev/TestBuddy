# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: testbuddy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: DOCKER_HUB_USERNAME/testbuddy-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

---
# ── Service (NodePort — accessible from browser) ──────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: testbuddy
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30000   # Access at http://localhost:30000
