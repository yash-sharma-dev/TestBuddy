# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: testbuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: zb8ne/testbuddy-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/testai
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: testbuddy-secrets
                  key: POSTGRES_PASSWORD
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: testbuddy-secrets
                  key: CLAUDE_API_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: testbuddy-secrets
                  key: JWT_SECRET
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: testbuddy-secrets
                  key: CORS_ALLOWED_ORIGINS
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: testbuddy
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
