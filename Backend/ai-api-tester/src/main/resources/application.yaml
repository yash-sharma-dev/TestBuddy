spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/testai}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 3

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

claude:
  api:
    key: ${CLAUDE_API_KEY:dummy}
    url: https://api.anthropic.com/v1/messages
    model: claude-haiku-4-5
    max-tokens: 10000
  pricing:
    input-per-million: ${CLAUDE_PRICING_INPUT:1.0}
    output-per-million: ${CLAUDE_PRICING_OUTPUT:5.0}
    cache-read-per-million: ${CLAUDE_PRICING_CACHE_READ:0.1}
    cache-creation-per-million: ${CLAUDE_PRICING_CACHE_CREATE:1.25}

jwt:
  secret: ${JWT_SECRET:testbuddy-jwt-secret-key-change-me-in-production-must-be-256-bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: testbuddy

resilience4j:
  retry:
    instances:
      claude:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - jakarta.persistence.EntityNotFoundException
  circuit-breaker:
    instances:
      claude:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

server:
  port: 8080
  max-http-request-header-size: 64KB
